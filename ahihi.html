<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Download App</title>

<style>
body {
    background: #0d1117;
    color: white;

    padding-top: 100px;
}

.box {
    background: #161b22;
    padding: 30px;
    border-radius: 15px;
    display: inline-block;
    width: 300px;
}

h2 {
    margin-bottom: 20px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

.ios {
    background: #238636;
}

.android {
    background: #1f6feb;
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="box">
    <h2>📲 ksign and esign</h2>

    <!-- iOS -->

    <!-- Android -->
    <button class="android" onclick="downloadAPK()">
        🤖 ksign
    </button>
</div>

</script>

</body>
</html>
