
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IPA Upload PRO</title>
<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
.box { margin:50px auto; padding:20px; background:#222; border-radius:10px; width:300px; }
input,button { margin:10px; padding:8px; width:90%; }
button { background:#0af; border:none; color:white; }
</style>
</head>
<body>
<div class="box">
<h2>Upload IPA</h2>
<form action="/upload" method="post" enctype="multipart/form-data">
<input type="file" name="file" required><br>
<input type="text" name="bundle" placeholder="Bundle ID" required><br>
<input type="text" name="version" placeholder="Version" required><br>
<input type="text" name="title" placeholder="App Name" required><br>
<button type="submit">Upload & Tạo Link</button>
</form>
</div>
</body>
</html>
